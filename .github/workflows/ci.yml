# CI — runs the same fast gate as local ./check.sh on every push/PR.
# The --full regression suite is NOT run here: it needs the recorded race
# archives (ARCHIVE_DIR), which are deliberately not in the repo. Run
# ./check.sh --full locally before merges that touch core calc logic.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: check.sh (fast gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      # PyQt6 needs these system libs even under QT_QPA_PLATFORM=offscreen
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1
      # mirror setup.sh so CI exercises the same venv path check.sh expects
      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt
      - name: Run test gate
        run: ./check.sh

  ui-typecheck:
    name: UI typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies
        run: npm ci --prefix ui
      - name: Typecheck
        run: npx --prefix ui tsc --noEmit -p ui
